name: eval-gate

# Cheap cloud smoke gate (the local Ollama fleet isn't reachable from GitHub runners).
# The authoritative model-drift gate is the LOCAL runner on the Mac Pro (eval/run_gate.sh
# against the LiteLLM proxy), which posts the `eval/golden-gate` commit status.
# This job is NOT a required check; it uses pinned free variants with lower provider
# rate limits, while CI (lint+tests) remains the deterministic code gate.

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "deploy/**"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci-smoke:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      LITELLM_MASTER_KEY: ci-not-used
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      EVAL_SUBSET: ci-smoke
      EVAL_NO_EMBED: "1"
      EVAL_THRESHOLD: "0.8"
      PROMPTFOO_VERSION: "0.121.17"
      PROMPTFOO_DISABLE_TELEMETRY: "1"
      PROMPTFOO_DISABLE_UPDATE: "1"
      PROMPTFOO_CACHE_PATH: ${{ github.workspace }}/.promptfoo-cache
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.promptfoo-cache
          key: promptfoo-${{ hashFiles('eval/**') }}
          restore-keys: promptfoo-
      - name: Cloud smoke gate
        run: bash eval/run_gate.sh promptfooconfig.ci.yaml
