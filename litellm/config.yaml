# Hermes fleet gateway — LiteLLM proxy.
#   litellm --config litellm/config.yaml --port 4010   (4000 is occupied on this box)
# Verified against LiteLLM v1.89.0 docs (2026-06) + the live Ollama models on this Mac Pro.
# "Hermes everywhere" = the Mac Pro + Mac mini both appear as `hermes-local` deployments,
# so the SAME model load-balances across both machines; a dead node is auto-benched.

model_list:
  # ---- PRIMARY: best local model, one entry per machine => true cross-host load-balance ----
  - model_name: hermes-local
    litellm_params:
      model: ollama_chat/qwen3:8b-64k
      api_base: http://127.0.0.1:11434          # Mac Pro (this box)
      num_ctx: 65536
      think: false                              # qwen3 thinks by default → empties the content field via the proxy; disable it
      keep_alive: "15m"
      rpm: 60
    model_info: {mode: chat, input_cost_per_token: 0, output_cost_per_token: 0, max_input_tokens: 65536, max_output_tokens: 8192}   # register ctx so enable_pre_call_checks doesn't raise "model isn't mapped yet" (unmapped :64k tag) and bench this fallback

  - model_name: hermes-local
    litellm_params:
      model: ollama_chat/qwen3:8b-64k
      api_base: http://100.94.135.78:11436       # Mac mini over Tailscale (LAN-agnostic; survives subnet/cellular changes). Offline => LiteLLM cools it down.
      num_ctx: 65536
      think: false                              # see Mac Pro entry — disable qwen3 thinking so content isn't empty via the proxy
      keep_alive: "15m"
      rpm: 40
    model_info: {mode: chat, input_cost_per_token: 0, output_cost_per_token: 0, max_input_tokens: 65536, max_output_tokens: 8192}   # register ctx so pre_call_checks doesn't raise "isn't mapped yet" and bench this fallback

  # ---- Local fallback: smaller/faster model on the Mac Pro ----
  - model_name: hermes-local-fast
    litellm_params:
      model: ollama_chat/qwen2.5:3b-64k
      api_base: http://127.0.0.1:11434
      num_ctx: 65536
    model_info: {mode: chat, input_cost_per_token: 0, output_cost_per_token: 0, max_input_tokens: 65536, max_output_tokens: 8192}

  - model_name: omlx-local
    litellm_params:
      model: openai/Llama-3.2-3B-Instruct-4bit
      api_base: http://127.0.0.1:8011/v1
      api_key: omlx
    model_info: {mode: chat, input_cost_per_token: 0, output_cost_per_token: 0, max_input_tokens: 131072, max_output_tokens: 8192}


  # ---- Mini-only HEAVY coder model: 14B won't fit the Mac Pro's RAM budget, but the mini has it.
  #      Reached over Tailscale. Opt-in (model: "hermes-coder") for hard coding; NOT in the auto-fallback. ----
  - model_name: hermes-coder
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b-64k
      api_base: http://100.94.135.78:11436        # Mac mini over Tailscale
      num_ctx: 65536
      keep_alive: "10m"
      rpm: 20
    model_info: {mode: chat, input_cost_per_token: 0, output_cost_per_token: 0, max_input_tokens: 65536, max_output_tokens: 8192}

  # ---- Cross-family local model. Also the eval JUDGE (different family than qwen) ----
  - model_name: hermes-gemma
    litellm_params:
      model: openai/gemma4-12b,gpu               # LiteRT OpenAI-compatible server
      api_base: http://127.0.0.1:9379/v1
      api_key: "none"
    model_info: {mode: chat, input_cost_per_token: 0, output_cost_per_token: 0, max_input_tokens: 32768, max_output_tokens: 8192}

  # ---- PRIMARY CLOUD: GLM-5.2 via the z.ai Coding Plan SUBSCRIPTION (flat monthly, already paid).
  #      Igor pays for this monthly — use it, not per-token OpenRouter. Rate-capped (historic 429s)
  #      => falls back to local qwen3, then OpenRouter GLM. GLM-5.2 reasons heavily; give it tokens. ----
  - model_name: glm-coding
    litellm_params:
      model: openai/glm-5.2
      api_base: https://api.z.ai/api/coding/paas/v4
      api_key: os.environ/Z_AI_API_KEY
      timeout: 45                               # bound a blackholed/slow z.ai so failover to local is fast (was unbounded=120s router default x retries ≈ minutes). 45s covers normal GLM reasoning; a stuck call fails over to hermes-local. Verified 2026-07-04.
    model_info: {mode: chat, max_input_tokens: 1000000, max_output_tokens: 128000}   # 1M ctx / 128K out per docs.z.ai — lets pre_call_checks route oversized prompts here

  # ---- Same subscription, lighter/faster model: GLM-5-Turbo (200K ctx). Verified live on the
  #      coding endpoint 2026-07-02. Also reasons heavily — give it ≥300 max_tokens. ----
  - model_name: glm-turbo
    litellm_params:
      model: openai/glm-5-turbo
      api_base: https://api.z.ai/api/coding/paas/v4
      api_key: os.environ/Z_AI_API_KEY
      timeout: 45                               # same fast-failover bound as glm-coding
    model_info: {mode: chat, max_input_tokens: 200000, max_output_tokens: 128000}

  # ---- Cloud fallback (paid PER-TOKEN). Only when the subscription is unreachable/quota-capped ----
  - model_name: cloud-fallback
    litellm_params:
      model: openrouter/z-ai/glm-5.2
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096                          # low OpenRouter balance: Hermes asks for 65536 out-tokens and OpenRouter 402s the whole call ("can only afford ~6K") — cap so the LAST-RESORT route actually serves instead of dying (seen 2026-07-07 during z.ai quota exhaustion)
    model_info: {mode: chat, max_output_tokens: 4096}

  # ---- Embeddings for the eval `similar` (cosine) assertion ----
  - model_name: text-embedding
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://127.0.0.1:11434
    model_info: {mode: embedding}

  # ---- OPTIONAL escalation tier: Sakana fugu-ultra. OFF by default (in NO fallback chain).
  #      Invoke deliberately with model: "escalation" for genuinely hard coding/research.
  #      $5/$30 per 1M + billed orchestration tokens + slow + EU-blocked. See fugu-ultra-evaluation memory.
  - model_name: escalation
    litellm_params:
      model: openrouter/sakana/fugu-ultra
      api_key: os.environ/OPENROUTER_API_KEY
    model_info: {mode: chat}

router_settings:
  routing_strategy: latency-based-routing       # auto-prefers the fastest live box
  num_retries: 1                                 # 1 retry (was 2): a down subscription endpoint won't recover on retry, so fewer retries => faster failover to local. Transient blips still get one retry.
  timeout: 120                                   # local 8b @ 64k ctx can be slow (cloud GLM models set their own 45s timeout for fast failover)
  allowed_fails: 2
  cooldown_time: 45                              # bench a dead node (the mini) for 45s
  enable_pre_call_checks: true                  # oversized prompt => bigger-ctx / cloud
  fallbacks: [{"glm-coding": ["hermes-local", "cloud-fallback"]}, {"glm-turbo": ["hermes-local", "cloud-fallback"]}, {"hermes-local": ["hermes-local-fast", "omlx-local", "glm-coding", "cloud-fallback"]}]   # subscription GLM → local → OpenRouter only as paid backup; a z.ai 429 likely caps BOTH glm routes, so turbo falls to local not glm-coding
  context_window_fallbacks: [{"hermes-local": ["glm-coding", "cloud-fallback"]}, {"glm-turbo": ["glm-coding"]}]   # >200K prompt on turbo => escalate to 1M-ctx glm-5.2
  content_policy_fallbacks: [{"glm-coding": ["hermes-local"]}, {"glm-turbo": ["hermes-local"]}]   # provider content-policy refusal => local model (separate trigger class per LiteLLM reliability docs)

litellm_settings:
  drop_params: true                             # tolerate provider-specific params
  callbacks: hermes_logger.proxy_handler_instance   # append every call to JSONL = golden-set / drift feed
  # callbacks: ["prometheus"]                   # (needs prometheus_client) -> GET /metrics

general_settings:
  background_health_checks: false   # off: don't waste ~28s probing the down LiteRT/offline mini; on-demand cooldown still protects fallbacks
  health_check_interval: 120
  # --- Turn these on with a Postgres URL: this is what builds the golden-set / drift dataset ---
  # database_url: os.environ/DATABASE_URL
  # store_prompts_in_spend_logs: true
