# Hermes fleet gateway — LiteLLM proxy.
#   litellm --config litellm/config.yaml --port 4010   (4000 is occupied on this box)
# Verified against LiteLLM v1.89.0 docs (2026-06) + the live Ollama models on this Mac Pro.
# "Hermes everywhere" = the Mac Pro + Mac mini both appear as `hermes-local` deployments,
# so the SAME model load-balances across both machines; a dead node is auto-benched.

model_list:
  # ---- PRIMARY: best local model, one entry per machine => true cross-host load-balance ----
  - model_name: hermes-local
    litellm_params:
      model: ollama_chat/qwen3:8b-64k
      api_base: http://127.0.0.1:11434          # Mac Pro (this box)
      num_ctx: 65536
      think: false                              # qwen3 thinks by default → empties the content field via the proxy; disable it
      keep_alive: "15m"
      rpm: 60
    model_info: {mode: chat, input_cost_per_token: 0, output_cost_per_token: 0, max_input_tokens: 65536, max_output_tokens: 8192}   # register ctx so enable_pre_call_checks doesn't raise "model isn't mapped yet" (unmapped :64k tag) and bench this fallback

  - model_name: hermes-local
    litellm_params:
      model: ollama_chat/qwen3:8b-64k
      api_base: http://100.94.135.78:11436       # Mac mini over Tailscale (LAN-agnostic; survives subnet/cellular changes). Offline => LiteLLM cools it down.
      num_ctx: 65536
      think: false                              # see Mac Pro entry — disable qwen3 thinking so content isn't empty via the proxy
      keep_alive: "15m"
      rpm: 40
    model_info: {mode: chat, input_cost_per_token: 0, output_cost_per_token: 0, max_input_tokens: 65536, max_output_tokens: 8192}   # register ctx so pre_call_checks doesn't raise "isn't mapped yet" and bench this fallback

  # ---- Local fallback: smaller/faster model on the Mac Pro ----
  - model_name: hermes-local-fast
    litellm_params:
      model: ollama_chat/qwen2.5:3b-64k
      api_base: http://127.0.0.1:11434
      num_ctx: 65536
    model_info: {mode: chat, input_cost_per_token: 0, output_cost_per_token: 0, max_input_tokens: 65536, max_output_tokens: 8192}

  - model_name: omlx-local
    litellm_params:
      model: openai/Llama-3.2-3B-Instruct-4bit
      api_base: http://127.0.0.1:8011/v1
      api_key: omlx
    model_info: {mode: chat, input_cost_per_token: 0, output_cost_per_token: 0, max_input_tokens: 131072, max_output_tokens: 8192}


  # ---- Mini-only HEAVY coder model: 14B won't fit the Mac Pro's RAM budget, but the mini has it.
  #      Reached over Tailscale. Opt-in (model: "hermes-coder") for hard coding; NOT in the auto-fallback. ----
  - model_name: hermes-coder
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b-64k
      api_base: http://100.94.135.78:11436        # Mac mini over Tailscale
      num_ctx: 65536
      keep_alive: "10m"
      rpm: 20
    model_info: {mode: chat, input_cost_per_token: 0, output_cost_per_token: 0, max_input_tokens: 65536, max_output_tokens: 8192}

  # ---- Cross-family local model. Also the eval JUDGE (different family than qwen) ----
  - model_name: hermes-gemma
    litellm_params:
      model: openai/gemma4-12b,gpu               # LiteRT OpenAI-compatible server
      api_base: http://127.0.0.1:9379/v1
      api_key: "none"
    model_info: {mode: chat, input_cost_per_token: 0, output_cost_per_token: 0, max_input_tokens: 32768, max_output_tokens: 8192}

  # ---- PRIMARY CLOUD: GLM-5.2 via the z.ai Coding Plan SUBSCRIPTION (flat monthly, already paid).
  #      Igor pays for this monthly — use it, not per-token OpenRouter. Rate-capped (historic 429s)
  #      => falls back to local qwen3, then OpenRouter GLM. GLM-5.2 reasons heavily; give it tokens. ----
  - model_name: glm-coding
    litellm_params:
      model: openai/glm-5.2
      api_base: https://api.z.ai/api/coding/paas/v4
      api_key: os.environ/Z_AI_API_KEY
      timeout: 45                               # bound a blackholed/slow z.ai so failover to local is fast (was unbounded=120s router default x retries ≈ minutes). 45s covers normal GLM reasoning; a stuck call fails over to hermes-local. Verified 2026-07-04.
    model_info: {mode: chat, max_input_tokens: 1000000, max_output_tokens: 128000}   # 1M ctx / 128K out per docs.z.ai — lets pre_call_checks route oversized prompts here

  # ---- VISION: GLM-4.6V multimodal via the SAME z.ai subscription. Powers hermes computer_use
  #      (reads screenshots) + image inputs. Verified 2026-07-09: read "HERMES42" from a PNG. ----
  - model_name: glm-vision
    litellm_params:
      model: openai/glm-4.6v
      api_base: https://api.z.ai/api/coding/paas/v4
      api_key: os.environ/Z_AI_API_KEY
      timeout: 60
    model_info: {mode: chat, supports_vision: true, max_input_tokens: 65536, max_output_tokens: 8192}

  # ---- NVIDIA Nemotron Super 49B via NIM (build.nvidia.com). OPT-IN by name (model: "nemotron");
  #      NOT in the auto-fallback chain — it's PER-TOKEN cloud, so it must not silently replace the
  #      flat GLM sub. Verified 2026-07-09: tool-calls correctly. Use for hard agentic/coding when
  #      you want a non-GLM opinion. Nemotron reasons heavily -> give it ≥1024 max_tokens. ----
  - model_name: nemotron
    litellm_params:
      model: openai/nvidia/llama-3.3-nemotron-super-49b-v1.5
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      timeout: 60
    model_info: {mode: chat, max_input_tokens: 131072, max_output_tokens: 8192}

  # ---- NVIDIA Nemotron 3 Ultra 550B via OpenRouter FREE tier. Wired into the auto-fallback
  #      chain (below) between cloud-fallback and hermes-local. Rationale: the 2026-07-09 outage
  #      (see fallbacks note) had both GLM routes fail and agents silently loop on qwen3:8b for
  #      hours. This is a strong, tool-calling model that FAILS HARD instead of degrading-200, so
  #      it belongs ahead of local. FREE tier => no per-token cost, so unlike `nemotron` (NIM,
  #      per-token) it is safe to automate. Verified tool-calling 2026-07-10 before wiring. ----
  - model_name: nemotron3-free
    litellm_params:
      model: openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 45
    model_info: {mode: chat, input_cost_per_token: 0, output_cost_per_token: 0, max_input_tokens: 131072, max_output_tokens: 8192}

  # ---- Poolside Laguna S 2.1 via OpenRouter FREE tier (118B/8B-active, coding-specialized;
  #      SWE-Bench Multilingual 78.5%, SWE-Bench Pro public 59.4% per Poolside's 2026-07-21
  #      release). Verified tool-calling 2026-07-23 (structured tool_calls, cost:0) before
  #      wiring into the auto-fallback chain below, same bar as nemotron3-free. Same
  #      OpenRouter account/key as nemotron3-free — a rate-limit or outage on that key
  #      affects both, so this adds model diversity (coding-specialized vs general-purpose),
  #      not provider diversity. ----
  - model_name: laguna-free
    litellm_params:
      model: openrouter/poolside/laguna-s-2.1:free
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 45
    model_info: {mode: chat, input_cost_per_token: 0, output_cost_per_token: 0, max_input_tokens: 1048576, max_output_tokens: 8192}

  # ---- OpenCode Zen FREE tier (opencode.ai gateway; account = Google SSO, key in
  #      ~/.hermes/.env, NO billing enabled — free models only, $0). Wired 2026-07-17 as a
  #      SECOND free pre-local rung in the auto-fallback chain (different provider infra
  #      than the OpenRouter :free route, so one gateway outage can't kill both).
  #      Paid Zen models (glm-5.2 $1.40/$4.40, kimi-k2.7-code $0.95/$4.00) and the Go
  #      $10/mo flat sub (second glm-5.2 quota pool) unlock after Igor enables billing —
  #      keep those OUT of auto-fallbacks like every per-token route. ----
  - model_name: opencode-free
    litellm_params:
      model: openai/deepseek-v4-flash-free
      api_base: https://opencode.ai/zen/v1
      api_key: os.environ/OPENCODE_API_KEY
      timeout: 45
    model_info: {mode: chat, input_cost_per_token: 0, output_cost_per_token: 0, max_input_tokens: 131072, max_output_tokens: 8192}

  # ---- OpenCode GO (flat $10/mo sub, ACTIVE since 2026-07-17): SAME glm-5.2 from an
  #      INDEPENDENT quota pool (880 req/5h) => the no-quality-drop first fallback when
  #      z.ai 429s. kimi-k2.7-code also included. Caps: $12/5h value — fallback leg,
  #      not co-primary. ----
  - model_name: opencode-go-glm
    litellm_params:
      model: openai/glm-5.2
      api_base: https://opencode.ai/zen/go/v1
      api_key: os.environ/OPENCODE_API_KEY
      timeout: 60
    model_info: {mode: chat, max_input_tokens: 200000, max_output_tokens: 128000}

  # ---- Kimi Code FLAT-RATE membership (Moderato $19/mo, ACTIVE 2026-07-17). sk-kimi-*
  #      console key, api.kimi.com/coding/v1, model kimi-for-coding = K2.7 Code (262K on
  #      Moderato). Flat sub => SAFE for the auto-fallback chain (unlike per-token
  #      kimi-coding on Moonshot). Opt-in by name for now; verified before any chain add. ----
  - model_name: kimi-code
    litellm_params:
      model: openai/kimi-for-coding
      api_base: https://api.kimi.com/coding/v1
      api_key: os.environ/KIMI_CODE_API_KEY
      timeout: 60
    model_info: {mode: chat, max_input_tokens: 262144, max_output_tokens: 16384}

  - model_name: opencode-go-kimi
    litellm_params:
      model: openai/kimi-k2.7-code
      api_base: https://opencode.ai/zen/go/v1
      api_key: os.environ/OPENCODE_API_KEY
      timeout: 60
    model_info: {mode: chat, max_input_tokens: 262144, max_output_tokens: 16384}

  # ---- Kimi K2.7 Code via the Moonshot platform (PER-TOKEN — existing key verified
  #      2026-07-17: GET /models lists kimi-k2.7-code, 262K ctx). Top open-source coding
  #      model (SWE-bench Verified 60.4%). OPT-IN by name like nemotron; NOT in the
  #      auto-fallback chain — per-token must not silently replace the flat GLM sub.
  #      A flat-rate membership route (api.kimi.com, sk-kimi-* console key) can be added
  #      as `kimi-code` once a Kimi Code console key exists; THAT one is the
  #      quota-diversification fallback candidate. ----
  - model_name: kimi-coding
    litellm_params:
      model: openai/kimi-k2.7-code
      api_base: https://api.moonshot.ai/v1
      api_key: os.environ/MOONSHOT_API_KEY
      timeout: 60
    model_info: {mode: chat, max_input_tokens: 262144, max_output_tokens: 16384}

  # ---- Same subscription, lighter/faster model: GLM-5-Turbo (200K ctx). Verified live on the
  #      coding endpoint 2026-07-02. Also reasons heavily — give it ≥300 max_tokens. ----
  - model_name: glm-turbo
    litellm_params:
      model: openai/glm-5-turbo
      api_base: https://api.z.ai/api/coding/paas/v4
      api_key: os.environ/Z_AI_API_KEY
      timeout: 45                               # same fast-failover bound as glm-coding
    model_info: {mode: chat, max_input_tokens: 200000, max_output_tokens: 128000}

  # ---- Cloud fallback (paid PER-TOKEN). Only when the subscription is unreachable/quota-capped ----
  # ---- Meta Muse Spark 1.1 via Meta Model API (added 2026-07-13). $20 free credits then
  #      $1.25/M in, $4.25/M out — cheapest capable tool-calling tier on the fleet. 1M ctx,
  #      multimodal, reasoning model (needs generous max_tokens). OPT-IN by name for now;
  #      candidate to precede the per-token NIM route in fallbacks once proven under load. ----
  - model_name: muse-spark
    litellm_params:
      model: openai/muse-spark-1.1
      api_base: https://api.meta.ai/v1
      api_key: os.environ/META_MODEL_API_KEY
      timeout: 90
    model_info: {mode: chat, max_input_tokens: 1000000, max_output_tokens: 16384}

  - model_name: cloud-fallback
    litellm_params:
      model: openrouter/z-ai/glm-5.2
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096                          # low OpenRouter balance: Hermes asks for 65536 out-tokens and OpenRouter 402s the whole call ("can only afford ~6K") — cap so the LAST-RESORT route actually serves instead of dying (seen 2026-07-07 during z.ai quota exhaustion)
    model_info: {mode: chat, max_output_tokens: 4096}

  # ---- Embeddings for the eval `similar` (cosine) assertion ----
  - model_name: text-embedding
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://127.0.0.1:11434
    model_info: {mode: embedding}

  # ---- OPTIONAL escalation tier: Sakana fugu-ultra. OFF by default (in NO fallback chain).
  #      Invoke deliberately with model: "escalation" for genuinely hard coding/research.
  #      $5/$30 per 1M + billed orchestration tokens + slow + EU-blocked. See fugu-ultra-evaluation memory.
  - model_name: escalation
    litellm_params:
      model: openrouter/sakana/fugu-ultra
      api_key: os.environ/OPENROUTER_API_KEY
    model_info: {mode: chat}

  # ---- Together.ai serverless (PER-TOKEN, key verified live 2026-07-19: 272 models,
  #      272-model catalog incl. Inkling/GLM-5.2/Kimi/DeepSeek). OPT-IN BY NAME ONLY —
  #      per-token, so kept OUT of every auto-fallback chain like kimi-coding/nemotron.
  #      `together-inkling` is the Inkling escalation route: $1.00/$4.05 per 1M —
  #      CHEAPER than the first-party Tinker route (see fleet-autonomy-research-2026-07).
  #      Inkling is a REASONING model → give it ≥900 max_tokens or content returns empty. ----
  - model_name: together-inkling
    litellm_params:
      model: openai/thinkingmachines/Inkling
      api_base: https://api.together.xyz/v1
      api_key: os.environ/TOGETHER_API_KEY
      timeout: 90
    model_info: {mode: chat, max_input_tokens: 262144, max_output_tokens: 8192}

  # ---- Together GLM-5.2: SAME model as the flat z.ai/OpenCode routes but a THIRD,
  #      independent quota pool → a manual cross-provider fallback for the documented
  #      triple-quota-exhaustion day (2026-07-12). Per-token → opt-in by name, NOT auto. ----
  - model_name: together-glm
    litellm_params:
      model: openai/zai-org/GLM-5.2
      api_base: https://api.together.xyz/v1
      api_key: os.environ/TOGETHER_API_KEY
      timeout: 60
    model_info: {mode: chat, max_input_tokens: 200000, max_output_tokens: 128000}

router_settings:
  routing_strategy: latency-based-routing       # auto-prefers the fastest live box
  num_retries: 1                                 # 1 retry (was 2): a down subscription endpoint won't recover on retry, so fewer retries => faster failover to local. Transient blips still get one retry.
  timeout: 120                                   # local 8b @ 64k ctx can be slow (cloud GLM models set their own 45s timeout for fast failover)
  allowed_fails: 2
  cooldown_time: 45                              # bench a dead node (the mini) for 45s
  enable_pre_call_checks: true                  # oversized prompt => bigger-ctx / cloud
  fallbacks: [{"glm-coding": ["opencode-go-glm", "nemotron3-free", "laguna-free", "opencode-free", "hermes-local"]}, {"glm-turbo": ["opencode-go-glm", "nemotron3-free", "laguna-free", "opencode-free", "hermes-local"]}, {"hermes-local": ["opencode-go-glm", "nemotron3-free", "laguna-free", "opencode-free", "glm-coding"]}]   # ZERO-SPEND chain (2026-07-14, extended 2026-07-23): subscription GLM → Nemotron-3-Ultra-550B (:free, tool-calling, fails-hard) → Poolside Laguna S 2.1 (:free, coding-specialized, tool-calling verified 2026-07-23) → local. Removed cloud-fallback (openrouter/z-ai/glm-5.2, PAID per-token) and nemotron (openai/nvidia/…-49b, METERED NIM) from every auto chain — those two paid routes ahead of local are what silently burned $175 on OpenRouter when the GLM sub hit its cap. nemotron3-free and laguna-free are both real tool-calling models, so they still satisfy "a real model must precede local" (a local model answers 200 with degraded output and short-circuits the router). If OpenRouter balance is negative, :free 402s and it falls straight through to local — still $0. Paid routes (cloud-fallback, escalation=fugu-ultra) remain defined for MANUAL use only.
  context_window_fallbacks: [{"hermes-local": ["glm-coding"]}, {"glm-turbo": ["glm-coding"]}]   # >200K prompt => 1M-ctx subscription glm-coding (was: cloud-fallback, PAID — removed 2026-07-14)
  content_policy_fallbacks: [{"glm-coding": ["hermes-local"]}, {"glm-turbo": ["hermes-local"]}]   # provider content-policy refusal => local model (separate trigger class per LiteLLM reliability docs)

litellm_settings:
  drop_params: true                             # tolerate provider-specific params
  callbacks: hermes_logger.proxy_handler_instance   # append every call to JSONL = golden-set / drift feed
  # callbacks: ["prometheus"]                   # (needs prometheus_client) -> GET /metrics

general_settings:
  background_health_checks: false   # off: don't waste ~28s probing the down LiteRT/offline mini; on-demand cooldown still protects fallbacks
  health_check_interval: 120
  # --- Turn these on with a Postgres URL: this is what builds the golden-set / drift dataset ---
  # database_url: os.environ/DATABASE_URL
  # store_prompts_in_spend_logs: true
